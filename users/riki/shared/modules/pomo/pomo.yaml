# yaml-language-server: $schema=https://raw.githubusercontent.com/Bahaaio/pomo/main/config/schema.json
# pomo config file
# https://github.com/Bahaaio/pomo

onSessionEnd: ask

asciiArt:
    enabled: true
    font: ansi
    color: "#89DCEB"

work:
    duration: 30m
    title: focus
    notification:
        enabled: true
        urgent: true
        title: task finished 🎉
        message: time to take a break
    then:
        - ["paplay", "--volume=32768", "~/.assets/pomo/break.wav"]

break:
    duration: 10m
    title: break session
    notification:
        enabled: true
        urgent: true
        title: break over 📑
        message: back to task!
    then:
        - ["paplay", "--volume=32768", "~/.assets/pomo/focus.wav"]

longBreak:
    enabled: true
    after: 3
    duration: 30m
